<style type="text/css">
  .input-group-addon {
    box-shadow: 9px 8px 7px #001a33;
  }

  .hm {
    background-image: url('assets/files/image.png.jpg');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 200px;
    padding-bottom: 200px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">
  <main>
    <div class="row pt-3">

      <div class="col-md-4 mb-4"></div>

      <div class="col-md-4 mb-4">
        <div class="card input-group-addon">
          <div class="card-body">

            <h3 *ngIf="!form.data.id" class="text-center default-text text-dark">Add Marksheet</h3>
            <h3 *ngIf="form.data.id > 0" class="text-center default-text text-dark">Update Marksheet</h3>

            <div>
              <H4 align="center">
                <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
              <H4 align="center">
                <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
            </div>

            <div class="md-form">

              <!-- Roll No -->
              <span class="pl-sm-5"><b>Roll No</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-hashtag grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="rollNo" [(ngModel)]="form.data.rollNo"
                    maxlength="5" placeholder="Enter Roll No">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.rollNo }}</font><br>

              <!-- Name (Student) -->
              <span class="pl-sm-5"><b>Name</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-user grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <select name="studentId" [(ngModel)]="form.data.studentId" class="form-control">
                    <option value="undefined">------------Select------------</option>
                    <option *ngFor="let obj of form.preload.studentList" [value]="obj.key">{{ obj.value }}</option>
                  </select>
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.studentId }}</font><br>

              <!-- Physics -->
              <span class="pl-sm-5"><b>Physics</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-flask grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="physics" [(ngModel)]="form.data.physics"
                    maxlength="3" placeholder="Enter Physics Marks">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.physics }}</font><br>

              <!-- Chemistry -->
              <span class="pl-sm-5"><b>Chemistry</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-flask grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="chemistry" [(ngModel)]="form.data.chemistry"
                    maxlength="3" placeholder="Enter Chemistry Marks">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.chemistry }}</font><br>

              <!-- Maths -->
              <span class="pl-sm-5"><b>Maths</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-calculator grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="maths" [(ngModel)]="form.data.maths"
                    maxlength="3" placeholder="Enter Maths Marks">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.maths }}</font><br>

              <!-- Buttons -->
              <div class="text-center">
                <input type="submit" (click)="submit()" class="btn btn-success btn-md" style="font-size: 17px"
                  value="Save">&nbsp;
                <input type="submit" (click)="forward('marksheetlist')" class="btn btn-warning btn-md" style="font-size: 17px"
                  value="List">
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4"></div>

    </div>
  </main>
</div>

<app-footer></app-footer>
