<style type="text/css">
  .input-group-addon {
    box-shadow: 9px 8px 7px #001a33;
  }

  .hm {
    background-image: url('assets/files/image.png.jpg');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 200px;
    padding-bottom: 200px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">
  <main>
    <div class="row pt-3">

      <div class="col-md-4 mb-4"></div>

      <div class="col-md-4 mb-4">
        <div class="card input-group-addon">
          <div class="card-body">

            <h3 *ngIf="!form.data.id" class="text-center default-text text-dark">Add College</h3>
            <h3 *ngIf="form.data.id > 0" class="text-center default-text text-dark">Update College</h3>

            <div>
              <H4 align="center">
                <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
              <H4 align="center">
                <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
            </div>

            <div class="md-form">

              <!-- Name -->
              <span class="pl-sm-5"><b>Name</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-university grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="name" [(ngModel)]="form.data.name"
                    placeholder="Enter College Name">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.name }}</font><br>

              <!-- Address -->
              <span class="pl-sm-5"><b>Address</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-map-marker grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="address" [(ngModel)]="form.data.address"
                    placeholder="Enter Address">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.address }}</font><br>

              <!-- State -->
              <span class="pl-sm-5"><b>State</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-map grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="state" [(ngModel)]="form.data.state"
                    placeholder="Enter State">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.state }}</font><br>

              <!-- City -->
              <span class="pl-sm-5"><b>City</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-building grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="city" [(ngModel)]="form.data.city"
                    placeholder="Enter City">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.city }}</font><br>

              <!-- Phone No -->
              <span class="pl-sm-5"><b>Phone No</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-phone grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="phoneNo" [(ngModel)]="form.data.phoneNo"
                    maxlength="10" placeholder="Enter Phone No.">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.phoneNo }}</font><br>

              <!-- Buttons -->
              <div class="text-center">
                <input type="submit" (click)="submit()" class="btn btn-success btn-md" style="font-size: 17px"
                  value="Save">&nbsp;
                <input type="submit" (click)="forward('/collegelist')" class="btn btn-warning btn-md" style="font-size: 17px"
                  value="List">
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4"></div>

    </div>
  </main>
</div>

<app-footer></app-footer>
