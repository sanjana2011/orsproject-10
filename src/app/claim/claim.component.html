<app-navbar></app-navbar>

<div align="center">
    <h1 *ngIf="!form.data.id" align="center" style="margin-bottom: 5px; color: navy">Add Claim</h1>
    <h1 *ngIf="form.data.id>0" align="center" style="margin-bottom: 5px; color: navy">Update Claim</h1>

    <div style="height: 20px; margin-bottom: 10px; text-align: center;">
        <h3 style="margin: 0; color: green;" *ngIf="!form.error && form.message">{{ form.message }}</h3>
        <h3 style="margin: 0; color: red;" *ngIf="form.error && form.message">{{ form.message }}</h3>
    </div>

    <table>
        <tr>
            <th align="left">Claim Number<span style="color: red">*</span></th>
            <td><input type="text" name="claimNumber" [(ngModel)]="form.data.claimNumber" placeholder="Enter Claim Number"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.claimNumber}}</td>
        </tr>

        <tr>
            <th align="left">Claim Amount<span style="color: red">*</span></th>
            <td><input type="number" name="claimAmount" [(ngModel)]="form.data.claimAmount" placeholder="Enter Claim Amount"></td>
            <td style="position: fixed; color: red;">{{form.inputerror.claimAmount}}</td>
        </tr>

        <tr>
            <th align="left">Status<span style="color: red">*</span></th>
            <td>
                <select name="status" [(ngModel)]="form.data.status" style="width: 170px;">
                    <option value="undefined">------------Select------------</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </td>
            <td style="position: fixed; color: red;">{{form.inputerror.status}}</td>
        </tr>

        <tr></tr>

        <tr>
            <th></th>
            <td align="left" colspan="2">
                <button (click)="submit()">save</button> &nbsp;
                <button (click)="forward('/claimlist')">list</button>
            </td>
        </tr>
    </table>
</div>

<app-footer></app-footer>
