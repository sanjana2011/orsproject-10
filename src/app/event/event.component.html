<style type="text/css">
  .input-group-addon {
    box-shadow: 9px 8px 7px #001a33;
  }

  .hm {
    background-image: url('assets/files/image.png.jpg');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 100px;
    padding-bottom: 400px;
  }
</style>

<app-navbar></app-navbar>

<div class="hm">
  <main>
    <div class="row pt-3">

      <div class="col-md-4 mb-4"></div>

      <div class="col-md-4 mb-4">
        <div class="card input-group-addon">
          <div class="card-body">

            <h3 *ngIf="!form.data.id" class="text-center default-text text-dark">Add Event</h3>
            <h3 *ngIf="form.data.id > 0" class="text-center default-text text-dark">Update Event</h3>

            <div>
              <H4 align="center">
                <div *ngIf="!form.error && form.message" class="alert alert-success alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
              <H4 align="center">
                <div *ngIf="form.error && form.message" class="alert alert-danger alert-dismissible">
                  <button type="button" class="close" data-dismiss="alert">&times;</button>
                  {{ form.message }}
                </div>
              </H4>
            </div>

            <div class="md-form">

              <!-- Event Name -->
              <span class="pl-sm-5"><b>Event Name</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-user grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="eventName" [(ngModel)]="form.data.eventName"
                    placeholder="Enter Event Name">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.eventName }}</font><br>

              <!-- Event Date -->
              <span class="pl-sm-5"><b>Event Date</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-calendar grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="date" class="form-control" name="eventDate" [(ngModel)]="form.data.eventDate"
                    [ngModel]="form.data.eventDate | date:'yyyy-MM-dd'">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.eventDate }}</font><br>

              <!-- Event Type -->
              <span class="pl-sm-5"><b>Event Type</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-tag grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                  <input type="text" class="form-control" name="eventType" [(ngModel)]="form.data.eventType"
                    placeholder="Enter Event Type">
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.eventType }}</font><br>

              <!-- College Name -->
              <span class="pl-sm-5"><b>College Name</b> <span style="color: red;">*</span></span><br>
              <div class="col-sm-12">
                <div class="input-group">
                  <div class="input-group-prepend">
                    <div class="input-group-text"><i class="fa fa-university grey-text" style="font-size: 1rem;"></i></div>
                  </div>
                 <select name="collegeId" [(ngModel)]="form.data.collegeId" class="form-control">
                    <option value="undefined">{{ 'UserForm.SelectOptions.Select' | translate }}</option>
                    <option *ngFor="let obj of form.preload.collegeList" [value]="obj.key">{{ obj.value }}</option>
                  </select>
                </div>
              </div>
              <font color="red" class="pl-sm-5">{{ form.inputerror.collegeId }}</font><br>

              <!-- Buttons -->
              <div class="text-center">
                <input type="submit" (click)="submit()" class="btn btn-success btn-md" style="font-size: 17px"
                  value="Save">&nbsp;
                <input type="submit" (click)="forward('/eventlist')" class="btn btn-warning btn-md" style="font-size: 17px"
                  value="List">
              </div>

            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4"></div>

    </div>
  </main>
</div>

<app-footer></app-footer>
